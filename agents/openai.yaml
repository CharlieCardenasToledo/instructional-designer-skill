interface:
  display_name: "Instructional Designer UIDE"
  short_description: "Crea guías académicas verificables y accesibles"
  brand_color: "#0f766e"
  default_prompt: "Usa $instructional-designer-uide para diseñar una guía semanal autoinstruccional."

dependencies:
